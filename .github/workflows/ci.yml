name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npm run typecheck

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npm run lint

  build:
    name: Build (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18, 20, 22]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - run: npm ci
      - run: npm run build

      - name: Verify build output exists
        run: test -f build/index.js

      - name: Check bundle size
        if: matrix.node-version == 20
        run: |
          SIZE=$(wc -c < build/index.js)
          echo "Bundle size: $((SIZE / 1024))KB"
          # Fail if bundle exceeds 1MB
          if [ "$SIZE" -gt 1048576 ]; then
            echo "::error::Bundle size ${SIZE} bytes exceeds 1MB limit"
            exit 1
          fi

  startup:
    name: Server startup check
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npm run build

      - name: Install Playwright Chromium
        run: npx playwright install chromium

      - name: Verify server starts and registers tools
        run: |
          timeout 10 node build/index.js 2>&1 | tee /tmp/startup.log || true
          if grep -q "tools registered" /tmp/startup.log; then
            echo "Server started and registered tools successfully"
          else
            echo "::error::Server did not register tools"
            cat /tmp/startup.log
            exit 1
          fi
