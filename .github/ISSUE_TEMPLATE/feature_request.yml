name: Feature Request
description: Suggest a new feature for Glance
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting a feature! We'd love to hear your ideas.
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this feature solve?
      placeholder: "I'm always frustrated when..."
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: How would you like this to work?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Any alternative solutions or workarounds you've considered?
  - type: dropdown
    id: category
    attributes:
      label: Category
      options:
        - New MCP Tool
        - Existing Tool Enhancement
        - Test Automation
        - Security
        - Performance
        - Developer Experience
        - Documentation
        - Other
    validations:
      required: true
