name: Bug Report
description: Report a bug in Glance
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug! Please fill in the details below.
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug.
      placeholder: What happened?
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: Steps to reproduce the behavior.
      value: |
        1. Configure Glance with...
        2. Call tool `browser_navigate` with...
        3. See error...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Glance Version
      placeholder: e.g., 1.0.0
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: Operating System
      options:
        - macOS
        - Windows
        - Linux
    validations:
      required: true
  - type: input
    id: node
    attributes:
      label: Node.js Version
      placeholder: e.g., 20.10.0
  - type: dropdown
    id: client
    attributes:
      label: MCP Client
      options:
        - Claude Code (CLI)
        - Claude Code (VS Code)
        - Claude Code (JetBrains)
        - Claude Desktop
        - Cursor
        - Other
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant Logs
      description: Paste any error messages or logs.
      render: shell
